<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>Inventory Pro</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app">
    <section id="login-view" class="view">
      <form id="login-form">
        <h2>Sign In</h2>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit">Login</button>
        <p id="login-error" class="error"></p>
      </form>
    </section>

    <section id="main-view" class="view hidden">
      <nav>
        <h1>InvPro</h1>
        <div>
          <button onclick="showSubView('dashboard')">📊 Dashboard</button>
          <button onclick="showSubView('products')">📦 Products</button>
          <button onclick="logout()" class="btn-danger">🚪 Logout</button>
        </div>
      </nav>

      <div id="content">
        <div id="dashboard-view" class="subview">
          <h2>Dashboard</h2>
          <div class="stats-grid">
            <div class="card"><h3>Revenue</h3><p id="total-revenue">$0.00</p></div>
            <div class="card"><h3>Profit</h3><p id="total-profit">$0.00</p></div>
            <div class="card"><h3>Low Stock</h3><p id="low-stock-count">0</p></div>
          </div>
          <p style="margin-top:16px; color:#64748b;">Connect Supabase tables to populate live data.</p>
        </div>

        <div id="products-view" class="subview hidden">
          <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
            <h2>Products</h2>
            <button id="add-product-btn">+ Add Product</button>
          </div>
          <div class="table-wrap">
            <table id="products-table">
              <thead><tr><th>Name</th><th>Qty</th><th>Sell Price</th><th>Actions</th></tr></thead>
              <tbody id="products-list"></tbody>
            </table>
          </div>

          <div id="product-modal" class="modal hidden">
            <div class="modal-content">
              <h3 id="modal-title">Add Product</h3>
              <form id="product-form">
                <input type="hidden" id="prod-id">
                <input type="text" id="prod-name" placeholder="Product Name" required>
                <input type="text" id="prod-category" placeholder="Category">
                <input type="number" id="prod-cost" placeholder="Cost Price" step="0.01" required>
                <input type="number" id="prod-sell" placeholder="Selling Price" step="0.01" required>
                <input type="number" id="prod-qty" placeholder="Quantity" required>
                <input type="text" id="prod-barcode" placeholder="Barcode (optional)">
                <div style="display:flex; gap:8px; margin-top:8px;">
                  <button type="submit">Save</button>
                  <button type="button" onclick="closeModal()">Cancel</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
